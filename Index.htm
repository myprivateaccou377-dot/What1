<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3; url=https://wa.me/2348012345678?text=Hello%20team">
  <title>Chatea con nosotros en WhatsApp | Nigeria</title>
  <meta name="description" content="Haz clic para chatear con nosotros al instante en WhatsApp. Estamos disponibles y listos para ayudarte ahora mismo.">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Chatea con nosotros en WhatsApp">
  <meta property="og:description" content="Estamos en línea y listos para ayudarte. Haz clic para abrir WhatsApp y enviarnos un mensaje al instante.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #25D366;
      --green-dark: #128C7E;
      --bg: #0a0f0d;
      --surface: #111a15;
      --text: #f0f7f2;
      --muted: #7aaa8a;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, #25D36618 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, #128C7E14 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* ===== TRANSLATOR BAR ===== */
    .translate-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #0d1a10;
      border-bottom: 1px solid #25D36640;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 9999;
    }
    .translate-bar .label {
      font-size: 13px;
      color: var(--green);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .translate-bar .label svg {
      width: 16px; height: 16px; flex-shrink: 0;
    }

    /* Style the Google Translate dropdown to be visible */
    #google_translate_element .goog-te-gadget-simple {
      background: #1a2e1e !important;
      border: 1px solid #25D366 !important;
      border-radius: 8px !important;
      padding: 6px 12px !important;
      font-family: 'Plus Jakarta Sans', sans-serif !important;
      font-size: 13px !important;
      cursor: pointer !important;
    }
    #google_translate_element .goog-te-gadget-simple span {
      color: var(--text) !important;
    }
    #google_translate_element .goog-te-gadget-simple .goog-te-menu-value span {
      color: #fff !important;
      font-size: 13px !important;
    }
    #google_translate_element a {
      text-decoration: none !important;
    }
    #google_translate_element img { display: none !important; }

    /* Hide Google's floating bar & branding */
    .goog-te-banner-frame { display: none !important; }
    .skiptranslate > font { display: none !important; }
    body { top: 0 !important; }
    .goog-te-gadget { font-size: 0 !important; }

    /* ===== CARD ===== */
    .card {
      background: var(--surface);
      border: 1px solid #25D36622;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 90%;
      text-align: center;
      position: relative;
      margin-top: 64px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wa-logo {
      width: 72px; height: 72px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 #25D36640; }
      50%       { box-shadow: 0 0 0 16px #25D36600; }
    }
    .wa-logo svg { width: 40px; height: 40px; }

    .flag { font-size: 2rem; margin-bottom: 0.5rem; display: block; }

    h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; line-height: 1.3; }
    p { font-size: 0.95rem; color: var(--muted); line-height: 1.7; margin-bottom: 2rem; }

    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--green); color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem; font-weight: 600;
      text-decoration: none;
      padding: 14px 32px; border-radius: 999px;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 1.5rem;
    }
    .btn:hover { background: #1ebe59; transform: scale(1.03); }
    .btn:active { transform: scale(0.98); }

    .progress-wrap { background: #1e2e22; border-radius: 999px; height: 4px; overflow: hidden; margin-bottom: 1rem; }
    .progress-bar { height: 100%; background: var(--green); border-radius: 999px; width: 0%; animation: fill 3s linear forwards; }
    @keyframes fill { to { width: 100%; } }

    .redirect-note { font-size: 0.8rem; color: var(--muted); }
    .redirect-note span { color: var(--green); font-weight: 600; }
  </style>
</head>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'es',
        includedLanguages: 'es,en,fr,de,it,pt,ar,zh-CN,zh-TW,ja,ko,ru,hi,bn,tr,pl,nl,sv,da,fi,no,el,cs,ro,hu,uk,id,ms,th,vi,sw,yo,ha,ig,af,am,az,be,bg,bs,ca,ceb,co,cy,eo,et,eu,fa,fy,ga,gl,gu,hr,ht,hy,is,jw,ka,kk,km,kn,ku,ky,la,lb,lo,lt,lv,mg,mi,mk,ml,mn,mr,my,ne,ny,or,pa,ps,sd,si,sk,sl,sm,sn,so,sq,sr,st,su,ta,te,tg,tk,tl,tt,ug,ur,uz,xh,yi,zu',

        layout: google.translate.TranslateElement.InlineLayout.SIMPLE

    // Auto-set to Spanish on load
    window.addEventListener('load', function() {
      setTimeout(function() {
        var selectEl = document.querySelector('.goog-te-combo');
        if (selectEl) {
          selectEl.value = 'es';
          selectEl.dispatchEvent(new Event('change'));
        }

    });
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
